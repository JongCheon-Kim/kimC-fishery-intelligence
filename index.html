<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수산물인텔리전스 - 김C GitHub Shell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .view-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 90px; }
        .view-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 독립 PiP 창 */
        #pip-window { 
            position: fixed; z-index: 9999; background: white; border-radius: 24px; 
            box-shadow: 0 40px 80px -15px rgba(0,0,0,0.5); display: none; flex-direction: column; 
            touch-action: none; border: 1px solid #e5e7eb; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pip-header { cursor: move; background: #f9fafb; border-bottom: 1px solid #eee; }
        .pip-body { flex: 1; overflow: auto; position: relative; background: #fff; }
        
        /* 인앱 상세보기 스타일 */
        #view-detail { overflow-y: auto !important; -webkit-overflow-scrolling: touch; }
        #detail-content-wrapper { min-height: 100%; overflow-x: hidden; }
        
        /* Iframe 렌더링 최적화 */
        iframe { width: 100%; height: 100%; min-height: 800px; border: none; background: #ffffff; }
        
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        /* 럭셔리 버튼 스타일 */
        .btn-fancy {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        .item-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-0 sm:p-8 font-sans overflow-hidden">

    <!-- 스마트폰 앱 컨테이너 -->
    <div id="app-container" class="w-full h-[100dvh] sm:h-[820px] sm:w-[420px] bg-white sm:rounded-[3.5rem] sm:shadow-[0_60px_120px_-30px_rgba(0,0,0,0.4)] relative overflow-hidden flex flex-col mx-auto border-[10px] border-slate-900 shadow-2xl">

        <header class="bg-white px-7 py-6 shadow-sm border-b flex justify-between items-center z-40 shrink-0">
            <div>
                <h1 class="font-black text-blue-800 leading-none text-xl tracking-tighter">수산물인텔리전스</h1>
                <div class="flex items-center gap-1.5 mt-1.5">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.6)]"></span>
                    <span class="text-[10px] text-slate-400 font-black tracking-widest uppercase">KIMC Master Shell v3.4</span>
                </div>
            </div>
            <div class="w-11 h-11 flex justify-center items-center rounded-2xl bg-blue-50 text-blue-600 shadow-inner border border-blue-100">
                <i class="ph-fill ph-fish text-2xl"></i>
            </div>
        </header>

        <main class="flex-1 relative overflow-hidden bg-slate-50 flex flex-col">
            <!-- 1. 리스트형 목록 (GitHub API 연동) -->
            <div id="view-list" class="view-content hide-scrollbar active flex flex-col h-full">
                <div class="px-7 pt-6 pb-4 flex justify-between items-center shrink-0">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-400 font-black uppercase tracking-[0.25em]">Cloud News</span>
                        <span class="text-xs font-black text-slate-700 tracking-tight"><span id="list-count" class="text-blue-600">0</span>건 실시간 연동</span>
                    </div>
                    <div class="flex space-x-1.5">
                        <button onclick="toggleSort()" id="btn-sort" class="text-[10px] bg-white border border-slate-200 text-slate-600 px-3 py-2.5 rounded-xl font-black shadow-sm active:bg-slate-50 transition-all flex items-center gap-1.5 uppercase">
                            <i class="ph-bold ph-sort-ascending"></i> Sort
                        </button>
                        <button onclick="syncFromGithub()" class="text-[10px] bg-slate-800 text-white px-3 py-2.5 rounded-xl font-black shadow-md flex items-center gap-1.5 active:scale-95 transition-all uppercase">
                            <i class="ph-bold ph-arrows-clockwise"></i> Sync
                        </button>
                    </div>
                </div>
                
                <div id="list-container" class="p-5 space-y-4 flex-1 overflow-y-auto hide-scrollbar">
                    <!-- 리스트 렌더링 영역 -->
                </div>
            </div>
            
            <!-- 2. 인앱 상세 보기 -->
            <div id="view-detail" class="view-content hide-scrollbar bg-slate-200 relative">
                <div class="sticky top-0 z-20 bg-white/95 backdrop-blur-md border-b border-slate-200 p-3.5 flex justify-between items-center shadow-sm">
                    <button onclick="setView('list')" class="w-11 h-11 flex items-center justify-center bg-slate-100 text-slate-600 rounded-2xl hover:bg-slate-200 transition-all active:scale-90">
                        <i class="ph-bold ph-arrow-left text-xl"></i>
                    </button>
                    <span id="detail-title" class="font-black text-sm truncate flex-1 text-center px-4 text-slate-800 tracking-tight leading-tight"></span>
                    <button onclick="switchToPip()" class="btn-fancy text-white px-4 py-3 rounded-2xl text-[10px] font-black shadow-lg flex items-center gap-1.5 active:scale-95 transition-all">
                        <i class="ph-bold ph-monitor-arrow-up"></i> 외부창
                    </button>
                </div>
                
                <div id="detail-content-wrapper" class="relative pb-32 px-4 pt-6"> 
                    <div id="detail-content" class="origin-top-left transition-transform w-full bg-white shadow-[0_30px_60px_rgba(0,0,0,0.15)] rounded-[2.5rem] overflow-hidden min-h-full border border-white">
                        <!-- 콘텐츠 주입 구역 -->
                    </div>
                </div>
                
                <!-- 줌 컨트롤러 -->
                <div class="fixed bottom-[95px] w-full sm:w-[400px] flex justify-center items-center z-20 pointer-events-none">
                    <div class="bg-slate-900/95 backdrop-blur-2xl border border-slate-700 px-7 py-3 rounded-full flex items-center space-x-12 shadow-[0_20px_50px_rgba(0,0,0,0.4)] pointer-events-auto">
                        <button onclick="adjustDetailZoom(-0.1)" class="text-slate-400 hover:text-white transition-all active:scale-90"><i class="ph-bold ph-minus-circle text-2xl"></i></button>
                        <span id="detail-zoom-val" class="font-black text-[12px] w-14 text-center text-blue-400 tracking-[0.2em]">100%</span>
                        <button onclick="adjustDetailZoom(0.1)" class="text-slate-400 hover:text-white transition-all active:scale-90"><i class="ph-bold ph-plus-circle text-2xl"></i></button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="absolute bottom-0 w-full bg-white border-t border-slate-100 flex justify-around items-center py-5 pb-8 z-30 shadow-[0_-15px_40px_rgba(0,0,0,0.04)]">
            <button onclick="setView('list')" class="flex flex-col items-center text-blue-700 w-1/2 group">
                <i class="ph-fill ph-house-line text-3xl mb-1 group-active:scale-90 transition-all"></i>
                <span class="text-[10px] font-black tracking-widest uppercase opacity-80">Portal</span>
            </button>
            <div class="w-px h-10 bg-slate-100"></div>
            <button onclick="openAdmin()" class="flex flex-col items-center text-slate-300 hover:text-blue-600 transition-all w-1/2 group">
                <i class="ph-fill ph-gear-six text-3xl mb-1 group-active:rotate-90 transition-all"></i>
                <span class="text-[10px] font-black tracking-widest uppercase opacity-80">Admin</span>
            </button>
        </nav>

        <!-- 관리자 모달 -->
        <div id="admin-modal" class="absolute inset-0 bg-slate-900/90 z-[110] hidden flex items-center justify-center sm:p-5 backdrop-blur-xl">
            <div class="bg-white w-full h-full sm:h-[92%] sm:rounded-[3.5rem] shadow-2xl relative flex flex-col overflow-hidden">
                <div class="p-7 border-b flex justify-between items-center bg-slate-50 shrink-0">
                    <h3 class="font-black text-slate-800 tracking-tighter text-xl uppercase">Master Controller</h3>
                    <button onclick="closeAdmin()" class="bg-white rounded-3xl w-11 h-11 flex items-center justify-center border border-slate-100 text-slate-400 shadow-sm active:bg-slate-50 transition-all"><i class="ph-bold ph-x text-2xl"></i></button>
                </div>
                
                <div id="admin-auth" class="p-10 flex flex-col justify-center flex-1">
                    <div class="text-center mb-12">
                        <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-6 shadow-inner border border-blue-100 border-dashed">
                            <i class="ph-fill ph-lock-key text-4xl"></i>
                        </div>
                        <h4 class="font-black text-slate-800 text-2xl tracking-tight leading-tight">Master Auth</h4>
                        <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest mt-2">Enter your secure passcode</p>
                    </div>
                    <input type="password" id="admin-pw" class="w-full border-2 border-slate-100 bg-slate-50 rounded-[1.75rem] p-6 text-center mb-8 text-slate-900 font-black tracking-[1em] text-2xl focus:border-blue-500 focus:bg-white outline-none transition-all shadow-inner" placeholder="••••">
                    <button onclick="verifyAdmin()" class="w-full btn-fancy text-white font-black py-6 rounded-[1.75rem] shadow-2xl active:scale-95 transition-all text-sm tracking-[0.2em] uppercase">Connect Now</button>
                </div>

                <div id="admin-config" class="hidden p-8 space-y-10 flex-1 overflow-y-auto hide-scrollbar">
                    <div class="bg-slate-900 p-8 rounded-[3rem] shadow-2xl text-white relative overflow-hidden border border-slate-800">
                        <i class="ph-fill ph-github-logo absolute -right-10 -bottom-10 text-[12rem] opacity-5 rotate-12"></i>
                        <h4 class="font-black text-lg mb-3 flex items-center gap-2">
                            <i class="ph-bold ph-plugs-connected text-blue-400"></i> Cloud Architecture
                        </h4>
                        <p class="text-[11px] opacity-60 leading-relaxed font-medium">
                            소장님, 레포지토리 이름이 <b>'KimC-fishery-intelligence'</b>인 경우<br>
                            아래에 <b>'본인아이디/KimC-fishery-intelligence'</b>를 적으시면 됩니다.
                        </p>
                    </div>

                    <div class="space-y-8">
                        <div class="group">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-3 mb-3 block group-focus-within:text-blue-600 transition-all">Target Repository</label>
                            <div class="relative">
                                <i class="ph-bold ph-globe absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-2xl group-focus-within:text-blue-500"></i>
                                <input type="text" id="conf-repo" class="w-full bg-slate-50 border-2 border-slate-50 py-6 pl-16 pr-8 rounded-[2rem] outline-none text-sm text-slate-800 font-black focus:bg-white focus:border-blue-500 transition-all shadow-sm" placeholder="username/repository">
                            </div>
                        </div>
                        <div class="group">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-3 mb-3 block group-focus-within:text-blue-600 transition-all">Data Path (Optional)</label>
                            <div class="relative">
                                <i class="ph-bold ph-folders absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 text-2xl group-focus-within:text-blue-500"></i>
                                <input type="text" id="conf-path" class="w-full bg-slate-50 border-2 border-slate-50 py-6 pl-16 pr-8 rounded-[2rem] outline-none text-sm text-slate-800 font-bold focus:bg-white focus:border-blue-500 transition-all shadow-sm" placeholder="특정 폴더가 있다면 입력">
                            </div>
                        </div>
                    </div>

                    <button onclick="saveConfig()" class="w-full bg-slate-900 text-white font-black py-6 rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.3)] active:scale-95 transition-all flex justify-center items-center gap-3 uppercase tracking-widest text-xs">
                        <i class="ph-bold ph-database"></i> Deploy and Save
                    </button>
                    <div class="h-12"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 외부 PiP -->
    <div id="pip-window" style="width: 600px; height: 850px; top: 5vh; left: calc(50vw + 280px);">
        <div class="pip-header p-6 flex justify-between items-center select-none bg-slate-50 border-b">
            <div class="flex items-center gap-3.5">
                <div class="w-3 h-3 bg-blue-500 rounded-full loading-pulse shadow-[0_0_12px_rgba(59,130,246,0.5)]"></div>
                <span id="pip-title" class="font-black text-sm truncate max-w-[320px] text-slate-700 tracking-tighter uppercase leading-none">External Intelligence View</span>
            </div>
            <div class="flex space-x-3">
                <button onclick="togglePipFull()" class="w-11 h-11 bg-white border border-slate-200 rounded-2xl text-slate-600 hover:bg-slate-50 shadow-sm transition-all"><i class="ph-bold ph-corners-out text-xl"></i></button>
                <button onclick="closePip()" class="w-11 h-11 bg-red-500 text-white rounded-2xl hover:bg-red-600 shadow-xl shadow-red-200 transition-all"><i class="ph-bold ph-x text-xl"></i></button>
            </div>
        </div>
        <div class="pip-body overflow-y-auto hide-scrollbar">
            <div id="pip-content" class="zoom-area p-8 min-h-full bg-white"></div>
        </div>
        <div class="p-5 border-t bg-white flex justify-center items-center space-x-16 text-slate-600 shadow-inner">
            <button onclick="adjustPipZoom(-0.1)" class="hover:text-blue-600 transition-all active:scale-90"><i class="ph-bold ph-minus-circle text-4xl"></i></button>
            <span id="pip-zoom-val" class="font-black text-sm w-20 text-center bg-slate-100 py-3 rounded-2xl border border-slate-200 tracking-[0.2em] text-slate-700">100%</span>
            <button onclick="adjustPipZoom(0.1)" class="hover:text-blue-600 transition-all active:scale-90"><i class="ph-bold ph-plus-circle text-4xl"></i></button>
        </div>
    </div>

    <script type="module">
        let newsItems = [];
        let config = {
            repo: '', 
            path: '',
            sortDesc: false
        };

        let currentActiveIndex = -1;
        let currentDetailZoom = 1;
        let currentPipZoom = 1;
        let isPipFull = false;

        window.onload = () => {
            const saved = localStorage.getItem('kimc_shell_config_v34');
            if(saved) config = JSON.parse(saved);
            
            if(!config.repo) {
                renderSetupGuide();
            } else {
                syncFromGithub();
            }
        };

        function renderSetupGuide() {
            document.getElementById('list-container').innerHTML = `
                <div class="text-center py-20 px-12">
                    <div class="w-32 h-32 bg-blue-50 rounded-[3rem] flex items-center justify-center mx-auto mb-12 shadow-inner relative border border-blue-100 border-dashed">
                        <i class="ph-duotone ph-rocket-launch text-7xl text-blue-500"></i>
                        <div class="absolute -right-4 -top-4 w-10 h-10 bg-blue-600 rounded-full border-[8px] border-white shadow-xl flex items-center justify-center">
                            <i class="ph-bold ph-link text-white text-sm"></i>
                        </div>
                    </div>
                    <h3 class="font-black text-slate-800 mb-5 text-2xl tracking-tighter leading-tight text-center">First Launch!</h3>
                    <p class="text-xs text-slate-400 leading-relaxed mb-14 font-medium text-center">
                        깃허브 연결 설정이 필요합니다.<br>
                        레포지토리 이름: <b class="text-blue-600">KimC-fishery-intelligence</b>
                    </p>
                    <button onclick="openAdmin()" class="w-full btn-fancy text-white font-black py-5 rounded-[2rem] shadow-2xl active:scale-95 transition-all uppercase tracking-[0.3em] text-xs">
                        Configure Now
                    </button>
                </div>`;
        }

        window.syncFromGithub = async () => {
            if(!config.repo) return;
            
            const listContainer = document.getElementById('list-container');
            listContainer.innerHTML = `
                <div class="text-center py-32 flex flex-col items-center">
                    <div class="relative w-24 h-24 mb-8 flex items-center justify-center">
                        <i class="ph-bold ph-circle-notch animate-spin text-7xl text-blue-500/20"></i>
                        <i class="ph-duotone ph-cloud-arrow-down animate-bounce text-4xl text-blue-600"></i>
                    </div>
                    <p class="font-black text-slate-400 uppercase tracking-[0.4em] text-[11px] leading-none">Cloud Synching</p>
                    <p class="text-[9px] text-slate-300 mt-2 font-bold uppercase tracking-widest">Accessing GitHub API</p>
                </div>`;

            try {
                const url = `https://api.github.com/repos/${config.repo}/contents/${config.path}`;
                const res = await fetch(url);
                if(!res.ok) throw new Error('Repository Not Accessible');
                
                const data = await res.json();
                
                // [필터] HTML/PDF만 가져오고 index.html, webplayer.html 등 본체 파일은 리스트에서 완벽 제거
                const ignoreFiles = ['index.html', 'webplayer.html', 'README.md', 'LICENSE'];
                newsItems = data.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const isValidType = (ext === 'html' || ext === 'pdf') && file.type === 'file';
                    const isNotSystemFile = !ignoreFiles.includes(file.name.toLowerCase());
                    return isValidType && isNotSystemFile;
                }).map(file => ({
                    title: file.name.replace(/\.(html|pdf)$/i, ''),
                    url: file.download_url, 
                    type: file.name.split('.').pop().toLowerCase(),
                    path: file.path
                }));

                updateView();
            } catch (e) {
                listContainer.innerHTML = `
                    <div class="p-14 text-center flex flex-col items-center bg-white rounded-[3rem] shadow-inner mt-10">
                        <div class="w-20 h-20 bg-red-50 rounded-3xl flex items-center justify-center mb-8 shadow-sm">
                            <i class="ph-bold ph-shield-warning text-5xl text-red-500"></i>
                        </div>
                        <p class="text-sm text-red-600 font-black mb-3 uppercase tracking-widest text-center">API Auth Error</p>
                        <p class="text-[11px] text-slate-400 leading-relaxed mb-12 text-center font-medium">${e.message}</p>
                        <button onclick="openAdmin()" class="bg-slate-100 text-slate-600 font-black py-4 px-12 rounded-[1.5rem] text-[11px] shadow-sm active:bg-slate-200 transition-all uppercase tracking-[0.2em]">Retry Setup</button>
                    </div>`;
            }
        };

        function updateView() {
            newsItems.sort((a, b) => {
                return config.sortDesc ? b.title.localeCompare(a.title) : a.title.localeCompare(b.title);
            });
            document.getElementById('list-count').innerText = newsItems.length;
            renderList();
        }

        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            if(newsItems.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-300 py-32 text-[11px] font-black uppercase tracking-[0.3em] italic border-4 border-dashed border-slate-100 rounded-[3rem]">No Intelligence Found</div>';
                return;
            }

            newsItems.forEach((item, index) => {
                const icon = item.type === 'pdf' ? 'ph-file-pdf text-red-500' : 'ph-file-html text-blue-500';
                const bgIcon = item.type === 'pdf' ? 'bg-red-50' : 'bg-blue-50';
                
                container.innerHTML += `
                    <div onclick="openDetail(${index})" class="item-card bg-white p-6 rounded-[2.25rem] shadow-[0_12px_24px_rgba(0,0,0,0.02)] border border-slate-100 flex justify-between items-center cursor-pointer active:scale-[0.95] transition-all group">
                        <div class="flex items-center flex-1 min-w-0 pr-4">
                            <div class="w-16 h-16 rounded-[1.5rem] ${bgIcon} flex items-center justify-center mr-6 shrink-0 border border-white group-hover:rotate-12 transition-all shadow-md group-hover:shadow-lg">
                                <i class="ph-duotone ${icon} text-4xl"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="font-black text-slate-800 text-[15px] truncate group-hover:text-blue-700 transition-colors tracking-tighter mb-1.5">${item.title}</div>
                                <div class="flex items-center gap-2">
                                    <span class="text-[8px] px-3 py-1.5 bg-slate-100 text-slate-400 font-black rounded-full uppercase tracking-[0.15em] group-hover:bg-blue-600 group-hover:text-white transition-all shadow-sm">Verified ${item.type}</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-slate-50 w-11 h-11 rounded-[1.25rem] flex items-center justify-center text-slate-300 group-hover:text-blue-600 group-hover:bg-blue-50 transition-all border border-slate-100 shadow-inner group-hover:rotate-90">
                            <i class="ph-bold ph-arrow-right text-2xl"></i>
                        </div>
                    </div>
                `;
            });
        }

        window.toggleSort = () => {
            config.sortDesc = !config.sortDesc;
            const btn = document.getElementById('btn-sort');
            btn.innerHTML = config.sortDesc ? '<i class="ph-bold ph-sort-descending"></i> Sort' : '<i class="ph-bold ph-sort-ascending"></i> Sort';
            updateView();
        };

        window.setView = (mode) => {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${mode}`).classList.add('active');
        };

        async function renderGithubContent(containerId, item) {
            const container = document.getElementById(containerId);
            container.innerHTML = `
                <div class="w-full h-full flex flex-col items-center justify-center py-40 bg-white rounded-[2.5rem]">
                    <div class="relative w-20 h-20 mb-8 flex items-center justify-center">
                        <i class="ph-bold ph-circle-notch animate-spin text-6xl text-blue-500"></i>
                        <i class="ph-fill ph-fingerprint absolute text-3xl text-blue-600/30"></i>
                    </div>
                    <p class="text-[11px] font-black text-slate-400 tracking-[0.4em] uppercase">Intelligence Loading</p>
                    <p class="text-[8px] text-slate-300 mt-2 font-black uppercase tracking-widest">Bypassing GitHub Sandbox</p>
                </div>`;

            if (item.type === 'pdf') {
                container.innerHTML = `<iframe src="${item.url}"></iframe>`;
            } else {
                try {
                    const res = await fetch(item.url);
                    const htmlText = await res.text();
                    // [핵심] Blob URL 기술을 사용하여 디자인 무너짐 완벽 방지
                    const blob = new Blob([htmlText], { type: 'text/html; charset=utf-8' });
                    const blobUrl = URL.createObjectURL(blob);
                    container.innerHTML = `<iframe src="${blobUrl}"></iframe>`;
                } catch (e) {
                    container.innerHTML = `<div class="p-20 text-center text-xs text-red-500 font-black uppercase tracking-[0.2em]">Critical Rendering Failure</div>`;
                }
            }
        }

        window.openDetail = (index) => {
            currentActiveIndex = index;
            const item = newsItems[index];
            document.getElementById('detail-title').innerText = item.title;
            renderGithubContent('detail-content', item);
            setView('detail');
            currentDetailZoom = 1; updateDetailZoom();
            document.getElementById('view-detail').scrollTop = 0;
        };

        window.adjustDetailZoom = (val) => {
            currentDetailZoom = Math.max(0.5, Math.min(3, currentDetailZoom + val));
            updateDetailZoom();
        };
        function updateDetailZoom() {
            const content = document.getElementById('detail-content');
            content.style.transform = `scale(${currentDetailZoom})`;
            content.style.width = currentDetailZoom > 1 ? `${100 / currentDetailZoom}%` : '100%';
            document.getElementById('detail-zoom-val').innerText = `${Math.round(currentDetailZoom*100)}%`;
        }

        window.switchToPip = () => {
            if(currentActiveIndex === -1) return;
            setView('list');
            openPip(currentActiveIndex);
        };

        window.openPip = (index) => {
            const item = newsItems[index];
            document.getElementById('pip-title').innerText = item.title;
            renderGithubContent('pip-content', item);
            document.getElementById('pip-window').style.display = 'flex';
            isPipFull = false;
            currentPipZoom = 1; updatePipZoom();
        };

        window.closePip = () => document.getElementById('pip-window').style.display = 'none';

        window.togglePipFull = () => {
            const pip = document.getElementById('pip-window');
            if(!isPipFull) {
                pip.style.width = '100vw'; pip.style.height = '100vh'; pip.style.top = '0'; pip.style.left = '0';
                pip.style.borderRadius = '0';
            } else {
                pip.style.width = '600px'; pip.style.height = '850px'; pip.style.top = '5vh'; pip.style.left = 'calc(50vw + 280px)';
                pip.style.borderRadius = '24px';
            }
            pip.style.transform = 'translate(0,0)';
            pip.setAttribute('data-x', 0); pip.setAttribute('data-y', 0);
            isPipFull = !isPipFull;
        };

        window.adjustPipZoom = (val) => {
            currentPipZoom = Math.max(0.5, Math.min(3, currentPipZoom + val));
            updatePipZoom();
        };
        function updatePipZoom() {
            const content = document.getElementById('pip-content');
            content.style.transform = `scale(${currentPipZoom})`;
            content.style.width = currentPipZoom > 1 ? `${100 / currentPipZoom}%` : '100%';
            document.getElementById('pip-zoom-val').innerText = `${Math.round(currentPipZoom*100)}%`;
        }

        window.openAdmin = () => {
            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-auth').classList.remove('hidden');
            document.getElementById('admin-config').classList.add('hidden');
            document.getElementById('admin-pw').value = '';
            document.getElementById('admin-pw').focus();
        };
        window.closeAdmin = () => document.getElementById('admin-modal').classList.add('hidden');
        window.verifyAdmin = () => {
            if(document.getElementById('admin-pw').value === '1208kjc@@@') {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-config').classList.remove('hidden');
                document.getElementById('conf-repo').value = config.repo;
                document.getElementById('conf-path').value = config.path;
            } else { 
                alert('인증 비밀번호가 틀렸습니다.'); 
            }
        };
        window.saveConfig = () => {
            const repoVal = document.getElementById('conf-repo').value.trim();
            const pathVal = document.getElementById('conf-path').value.trim();
            if(!repoVal) return alert('Repository 정보를 입력하세요.');
            config.repo = repoVal;
            config.path = pathVal;
            localStorage.setItem('kimc_shell_config_v34', JSON.stringify(config));
            closeAdmin();
            syncFromGithub();
        };

        interact('#pip-window').draggable({
            allowFrom: '.pip-header',
            listeners: { move(e) {
                const t = e.target;
                const x = (parseFloat(t.getAttribute('data-x')) || 0) + e.dx;
                const y = (parseFloat(t.getAttribute('data-y')) || 0) + e.dy;
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.setAttribute('data-x', x); t.setAttribute('data-y', y);
            }}
        });
    </script>
</body>
</html>
