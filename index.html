<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>수산물인텔리전스 - GitHub HTML WebPlayer v2</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100%;
        }

        body {
            -webkit-text-size-adjust: 100%;
            overscroll-behavior: none;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .view-content {
            display: none;
            height: 100%;
            min-height: 0;
            overflow-y: auto;
            padding-bottom: 96px;
            -webkit-overflow-scrolling: touch;
        }

        .view-content.active {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.25s ease-in-out;
        }

        #app-container {
            height: 100svh;
            max-height: 100svh;
        }

        @supports (height: 100dvh) {
            #app-container {
                height: 100dvh;
                max-height: 100dvh;
            }
        }

        /* 상세보기: 아래에서 위로 올라오는 슬라이드업 패널 */
        #detail-backdrop {
            position: absolute;
            inset: 0;
            z-index: 45;
            background: rgba(15, 23, 42, 0.28);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        #detail-backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        #detail-panel {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 86%;
            z-index: 60;
            background: #e5e7eb;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -18px 38px rgba(15, 23, 42, 0.24);
            transform: translateY(105%);
            transition: transform 0.28s cubic-bezier(.2,.8,.2,1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            will-change: transform;
        }

        #detail-panel.active {
            transform: translateY(0);
        }

        #detail-content-wrapper {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 8px;
            -webkit-overflow-scrolling: touch;
        }

        #detail-content,
        #pip-content {
            transform-origin: top left;
        }

        #detail-content {
            width: 100%;
            height: 100%;
            min-height: 100%;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.14);
            transition: transform 0.18s ease, width 0.18s ease;
        }

        iframe.news-frame {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 100%;
            border: none;
            background: #ffffff;
        }

        /* PiP 창 */
        #pip-window {
            position: fixed;
            z-index: 9999;
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.48);
            display: none;
            flex-direction: column;
            touch-action: none;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            transition: width 0.25s ease, height 0.25s ease, top 0.25s ease, left 0.25s ease, border-radius 0.25s ease;
        }

        .pip-header {
            cursor: move;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
        }

        .pip-body {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #e5e7eb;
        }

        #pip-content {
            width: 100%;
            min-height: 100%;
            transition: transform 0.18s ease, width 0.18s ease;
        }

        #pip-content iframe.news-frame {
            min-height: 720px;
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        @media (min-width: 641px) {
            #app-container {
                height: 820px;
                max-height: min(820px, calc(100vh - 64px));
            }

            #detail-panel {
                height: 88%;
            }
        }

        @media (max-width: 640px) {
            body {
                align-items: stretch !important;
                justify-content: flex-start !important;
                overflow: hidden;
            }

            #app-container {
                width: 100vw !important;
                max-width: 100vw !important;
                border-radius: 0 !important;
                border-left: none !important;
                border-right: none !important;
            }

            header {
                padding-top: calc(env(safe-area-inset-top) + 12px);
            }

            #detail-panel {
                height: 86%;
                border-radius: 22px 22px 0 0;
            }

            #pip-window {
                border-radius: 16px;
            }
        }
    </style>
</head>

<body class="bg-gray-200 min-h-[100svh] sm:min-h-screen flex sm:items-center sm:justify-center p-0 sm:p-8 font-sans overflow-hidden">

    <div id="app-container" class="w-full max-w-[420px] sm:w-[420px] bg-gray-50 sm:rounded-[2rem] sm:shadow-2xl relative overflow-hidden flex flex-col mx-auto border border-gray-300">

        <header class="bg-white px-5 py-4 shadow-sm border-b flex justify-between items-center z-40 shrink-0">
            <div class="min-w-0">
                <h1 class="font-extrabold text-blue-700 leading-none text-lg truncate">수산물인텔리전스</h1>
                <span class="text-[10px] text-gray-400 font-bold">GitHub HTML WebPlayer v2</span>
            </div>
            <div class="w-8 h-8 flex justify-center items-center rounded-full bg-blue-50 text-blue-600 shrink-0">
                <i class="ph-bold ph-github-logo text-lg"></i>
            </div>
        </header>

        <main class="flex-1 relative overflow-hidden bg-gray-100 flex flex-col min-h-0">

            <div id="view-list" class="view-content hide-scrollbar active flex flex-col h-full">
                <div class="px-4 pt-4 pb-3 bg-gray-100 shrink-0 space-y-2">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-500">총 <span id="list-count">0</span>건</span>
                        <button onclick="refreshGithubFiles()" class="text-[10px] bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded font-bold shadow-sm flex items-center gap-1 active:scale-95">
                            <i class="ph-bold ph-arrow-clockwise"></i> 새로고침
                        </button>
                    </div>

                    <div class="relative">
                        <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input id="search-input" oninput="applyFilters()" type="search" placeholder="소식지 검색"
                            class="w-full bg-white border border-gray-200 rounded-xl py-2 pl-9 pr-3 text-xs text-gray-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                    </div>

                    <div class="flex justify-between items-center">
                        <div class="flex space-x-1">
                            <button onclick="toggleSort('title')" id="btn-sort-title" class="text-[10px] bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded font-bold shadow-sm transition-colors">이름순</button>
                            <button onclick="toggleSort('time')" id="btn-sort-time" class="text-[10px] bg-blue-600 text-white border border-blue-600 px-2 py-1 rounded font-bold shadow-sm transition-colors">최신순</button>
                        </div>
                        <span id="repo-label" class="text-[9px] text-gray-400 font-bold truncate max-w-[190px]"></span>
                    </div>
                </div>

                <div id="list-container" class="p-4 space-y-3 flex-1 overflow-y-auto min-h-0">
                    <div class="text-center text-gray-500 py-10 text-sm flex flex-col items-center">
                        <i class="ph-duotone ph-spinner-gap animate-spin text-3xl mb-2 text-blue-400"></i>
                        GitHub HTML 파일 목록을 불러오는 중입니다...
                    </div>
                </div>
            </div>
        </main>

        <nav class="absolute bottom-0 w-full bg-white border-t flex justify-center items-center pt-3 pb-[calc(env(safe-area-inset-bottom)+12px)] z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
            <button onclick="closeDetailPanel(); setView('list')" class="flex flex-col items-center text-blue-600 w-full group">
                <div class="p-1 group-hover:bg-blue-50 rounded-lg transition-colors flex flex-col items-center">
                    <i class="ph-fill ph-list-bullets text-2xl mb-1"></i>
                    <span class="text-[10px] font-bold">목록보기</span>
                </div>
            </button>
        </nav>

        <div id="detail-backdrop" onclick="closeDetailPanel()"></div>

        <section id="detail-panel" aria-hidden="true">
            <div class="bg-white border-b border-gray-200 px-3 py-2.5 flex justify-between items-center shadow-sm shrink-0">
                <button onclick="closeDetailPanel()" class="w-9 h-9 flex items-center justify-center bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition-colors active:scale-95" title="상세보기 닫기">
                    <i class="ph-bold ph-arrow-down text-lg"></i>
                </button>

                <span id="detail-title" class="font-bold text-sm truncate flex-1 text-center px-2 text-gray-800"></span>

                <button onclick="switchToPip()" class="bg-blue-600 text-white px-3 py-1.5 rounded-full text-[10px] font-bold shadow-md flex items-center gap-1 hover:bg-blue-700 transition-colors active:scale-95">
                    <i class="ph-bold ph-monitor-arrow-up"></i> PiP
                </button>
            </div>

            <div id="detail-content-wrapper">
                <div id="detail-content"></div>
            </div>

            <div class="bg-white/95 backdrop-blur border-t p-1.5 flex justify-center items-center space-x-6 shrink-0 shadow-[0_-5px_10px_rgba(0,0,0,0.05)]">
                <button onclick="adjustDetailZoom(-0.1)" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 active:bg-gray-200 text-gray-500">
                    <i class="ph-bold ph-minus-circle text-2xl"></i>
                </button>

                <span id="detail-zoom-val" class="font-bold text-xs w-10 text-center text-gray-700">100%</span>

                <button onclick="adjustDetailZoom(0.1)" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 active:bg-gray-200 text-gray-500">
                    <i class="ph-bold ph-plus-circle text-2xl"></i>
                </button>
            </div>
        </section>
    </div>

    <div id="pip-window" style="width: 450px; height: 700px; top: 5vh; left: calc(50vw + 220px);">
        <div class="pip-header p-3 flex justify-between items-center select-none bg-gradient-to-r from-gray-50 to-gray-100">
            <div class="flex items-center min-w-0">
                <i class="ph-fill ph-dots-six-vertical text-gray-400 mr-2 cursor-move shrink-0"></i>
                <span id="pip-title" class="font-bold text-sm truncate max-w-[230px] text-gray-800">소식지 외부창</span>
            </div>

            <div class="flex space-x-2 items-center shrink-0">
                <button onclick="togglePipFull()" id="pip-full-btn" class="w-8 h-8 flex justify-center items-center text-gray-600 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-50" title="전체화면 전환">
                    <i class="ph-bold ph-corners-out text-lg"></i>
                </button>

                <button onclick="closePip()" class="w-8 h-8 flex justify-center items-center text-white bg-red-500 rounded-lg shadow-sm hover:bg-red-600" title="창 닫기">
                    <i class="ph-bold ph-x text-lg"></i>
                </button>
            </div>
        </div>

        <div class="pip-body overflow-y-auto bg-gray-200" id="pip-scroll-area">
            <div id="pip-content" class="zoom-area p-4 min-h-full bg-white shadow-md"></div>
        </div>

        <div class="p-2 border-t bg-white flex justify-center items-center space-x-6 text-gray-600 shrink-0">
            <button onclick="adjustPipZoom(-0.1)" class="hover:text-blue-600 transition-colors">
                <i class="ph-bold ph-minus-circle text-2xl"></i>
            </button>

            <span id="pip-zoom-val" class="font-bold text-xs w-12 text-center bg-gray-100 py-1 rounded">100%</span>

            <button onclick="adjustPipZoom(0.1)" class="hover:text-blue-600 transition-colors">
                <i class="ph-bold ph-plus-circle text-2xl"></i>
            </button>
        </div>
    </div>

    <script>
        const OWNER = "JongCheon-Kim";
        const REPO = "kimC-fishery-intelligence";
        const BRANCH = "main";
        const DIRECTORY = "";

        const GITHUB_API_URL = DIRECTORY
            ? `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DIRECTORY}?ref=${BRANCH}`
            : `https://api.github.com/repos/${OWNER}/${REPO}/contents?ref=${BRANCH}`;

        const GITHUB_PAGES_BASE = DIRECTORY
            ? `https://${OWNER}.github.io/${REPO}/${DIRECTORY}/`
            : `https://${OWNER}.github.io/${REPO}/`;

        let serverItems = [];
        let newsItems = [];

        let currentSortType = "time";
        let sortDesc = true;

        let currentActiveIndex = -1;
        let currentDetailZoom = 1;
        let currentPipZoom = 1;
        let isPipFull = false;

        document.getElementById("repo-label").innerText = `${OWNER}/${REPO}`;

        function escapeHTML(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function cleanTitle(fileName) {
            return fileName
                .replace(/\.html?$/i, "")
                .replace(/_/g, " ")
                .trim();
        }

        function getFileOrderNumber(fileName) {
            const match = String(fileName).match(/^(\d+)/);
            return match ? Number(match[1]) : 0;
        }

        async function fetchLastCommitDate(path) {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/commits?path=${encodeURIComponent(path)}&per_page=1&sha=${BRANCH}`;

            try {
                const res = await fetch(url, {
                    headers: { "Accept": "application/vnd.github+json" }
                });

                if (!res.ok) return null;

                const commits = await res.json();

                return commits?.[0]?.commit?.committer?.date ||
                       commits?.[0]?.commit?.author?.date ||
                       null;
            } catch {
                return null;
            }
        }

        async function loadGithubFiles() {
            const listContainer = document.getElementById("list-container");

            listContainer.innerHTML = `
                <div class="text-center text-gray-500 py-10 text-sm flex flex-col items-center">
                    <i class="ph-duotone ph-spinner-gap animate-spin text-3xl mb-2 text-blue-400"></i>
                    GitHub HTML 파일 목록을 불러오는 중입니다...
                </div>
            `;

            try {
                const res = await fetch(GITHUB_API_URL, {
                    headers: { "Accept": "application/vnd.github+json" }
                });

                if (!res.ok) {
                    throw new Error(`GitHub API 오류: ${res.status}`);
                }

                const files = await res.json();

                const htmlFiles = Array.isArray(files)
                    ? files.filter(file =>
                        file.type === "file" &&
                        /\.html?$/i.test(file.name) &&
                        !/^index\.html?$/i.test(file.name)
                    )
                    : [];

                const mapped = await Promise.all(htmlFiles.map(async (file) => {
                    const commitDate = await fetchLastCommitDate(file.path);
                    const pageUrl = GITHUB_PAGES_BASE + encodeURIComponent(file.name).replace(/%20/g, "%20");

                    return {
                        id: file.sha,
                        title: cleanTitle(file.name),
                        fileName: file.name,
                        path: file.path,
                        url: pageUrl,
                        htmlUrl: file.html_url,
                        type: "html",
                        size: file.size || 0,
                        orderNo: getFileOrderNumber(file.name),
                        timestamp: commitDate ? new Date(commitDate).getTime() : getFileOrderNumber(file.name)
                    };
                }));

                serverItems = mapped;
                applyFilters();

            } catch (error) {
                console.error(error);

                serverItems = [];
                newsItems = [];

                document.getElementById("list-count").innerText = "0";

                listContainer.innerHTML = `
                    <div class="text-center text-red-500 py-10 text-sm px-5">
                        <i class="ph-duotone ph-warning-circle text-3xl mb-2"></i>
                        <div class="font-bold mb-1">파일 목록을 불러오지 못했습니다.</div>
                        <div class="text-xs text-red-400">저장소 공개 여부, GitHub Pages 설정, API 제한을 확인하십시오.</div>
                    </div>
                `;
            }
        }

        window.refreshGithubFiles = () => loadGithubFiles();

        window.applyFilters = () => {
            const keyword = document.getElementById("search-input").value.trim().toLowerCase();

            newsItems = serverItems.filter(item => {
                if (!keyword) return true;

                return [item.title, item.fileName, item.path]
                    .some(v => String(v || "").toLowerCase().includes(keyword));
            });

            newsItems.sort((a, b) => {
                if (currentSortType === "time") {
                    const timeA = a.timestamp || 0;
                    const timeB = b.timestamp || 0;
                    return sortDesc ? timeB - timeA : timeA - timeB;
                }

                const titleA = a.title || "";
                const titleB = b.title || "";

                return sortDesc
                    ? titleB.localeCompare(titleA, "ko")
                    : titleA.localeCompare(titleB, "ko");
            });

            document.getElementById("list-count").innerText = newsItems.length;
            renderListView();
        };

        window.toggleSort = (type) => {
            if (currentSortType === type) {
                sortDesc = !sortDesc;
            } else {
                currentSortType = type;
                sortDesc = type === "time";
            }

            const titleBtn = document.getElementById("btn-sort-title");
            const timeBtn = document.getElementById("btn-sort-time");

            titleBtn.className = currentSortType === "title"
                ? "text-[10px] bg-blue-600 text-white border border-blue-600 px-2 py-1 rounded font-bold shadow-sm transition-colors"
                : "text-[10px] bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded font-bold shadow-sm transition-colors";

            timeBtn.className = currentSortType === "time"
                ? "text-[10px] bg-blue-600 text-white border border-blue-600 px-2 py-1 rounded font-bold shadow-sm transition-colors"
                : "text-[10px] bg-white border border-gray-200 text-gray-600 px-2 py-1 rounded font-bold shadow-sm transition-colors";

            applyFilters();
        };

        function renderListView() {
            const listContainer = document.getElementById("list-container");
            listContainer.innerHTML = "";

            if (newsItems.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center text-gray-500 py-10 text-sm">
                        표시할 HTML 파일이 없습니다.
                    </div>
                `;
                return;
            }

            newsItems.forEach((item, index) => {
                const dateObj = item.timestamp ? new Date(item.timestamp) : null;

                const dateStr = dateObj && !Number.isNaN(dateObj.getTime())
                    ? dateObj.toLocaleString("ko-KR", {
                        year: "numeric",
                        month: "2-digit",
                        day: "2-digit",
                        hour: "2-digit",
                        minute: "2-digit"
                    })
                    : "GitHub Pages";

                const card = document.createElement("div");

                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center cursor-pointer hover:border-blue-300 active:scale-[0.98] transition-all group";

                card.innerHTML = `
                    <div class="flex items-center flex-1 min-w-0 pr-4">
                        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center mr-3 shrink-0 border border-gray-100">
                            <i class="ph-duotone ph-file-html text-blue-500 text-2xl"></i>
                        </div>

                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-gray-800 text-sm mb-1 truncate group-hover:text-blue-600">
                                ${escapeHTML(item.title)}
                            </div>

                            <div class="text-[10px] text-gray-400 flex items-center truncate">
                                <i class="ph-fill ph-clock mr-1"></i>
                                ${escapeHTML(dateStr)} · ${escapeHTML(item.fileName)}
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-50 group-hover:bg-blue-50 w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-colors">
                        <i class="ph-bold ph-caret-right text-gray-400 group-hover:text-blue-500"></i>
                    </div>
                `;

                card.addEventListener("click", () => openDetail(index));
                listContainer.appendChild(card);
            });
        }

        function renderIframe(containerId, item) {
            const target = document.getElementById(containerId);
            target.innerHTML = "";

            const iframe = document.createElement("iframe");
            iframe.className = "news-frame";
            iframe.src = item.url;
            iframe.loading = "lazy";
            iframe.setAttribute("title", item.title || item.fileName || "GitHub HTML document");

            target.appendChild(iframe);
        }

        window.setView = (mode) => {
            document.querySelectorAll(".view-content").forEach(v => v.classList.remove("active"));

            const targetView = document.getElementById(`view-${mode}`);

            if (targetView) {
                targetView.classList.add("active");
            }
        };

        window.openDetail = (index) => {
            currentActiveIndex = index;

            const item = newsItems[index];

            if (!item) return;

            document.getElementById("detail-title").innerText = item.title;

            renderIframe("detail-content", item);

            currentDetailZoom = 1;
            updateDetailZoom();

            const panel = document.getElementById("detail-panel");
            const backdrop = document.getElementById("detail-backdrop");

            backdrop.classList.add("active");
            panel.classList.add("active");
            panel.setAttribute("aria-hidden", "false");
        };

        window.closeDetailPanel = () => {
            const panel = document.getElementById("detail-panel");
            const backdrop = document.getElementById("detail-backdrop");

            panel.classList.remove("active");
            backdrop.classList.remove("active");
            panel.setAttribute("aria-hidden", "true");
        };

        window.adjustDetailZoom = (val) => {
            currentDetailZoom = Math.max(0.5, Math.min(3, currentDetailZoom + val));
            updateDetailZoom();
        };

        function updateDetailZoom() {
            const content = document.getElementById("detail-content");

            content.style.transform = `scale(${currentDetailZoom})`;
            content.style.width = currentDetailZoom > 1 ? `${100 / currentDetailZoom}%` : "100%";

            document.getElementById("detail-zoom-val").innerText = `${Math.round(currentDetailZoom * 100)}%`;
        }

        window.switchToPip = () => {
            if (currentActiveIndex === -1) return;

            openPip(currentActiveIndex);
            closeDetailPanel();
        };

        window.openPip = (index) => {
            const item = newsItems[index];

            if (!item) return;

            document.getElementById("pip-title").innerText = item.title;

            renderIframe("pip-content", item);

            const pipWin = document.getElementById("pip-window");
            pipWin.style.display = "flex";

            const isMobile = window.innerWidth <= 600;

            if (isMobile) {
                pipWin.style.width = "92vw";
                pipWin.style.height = "82svh";
                pipWin.style.top = "9svh";
                pipWin.style.left = "4vw";
                pipWin.style.borderRadius = "16px";
            } else {
                pipWin.style.width = "450px";
                pipWin.style.height = "700px";
                pipWin.style.top = "5vh";
                pipWin.style.left = "calc(50vw + 220px)";
                pipWin.style.borderRadius = "16px";
            }

            pipWin.style.transform = "translate(0px, 0px)";
            pipWin.setAttribute("data-x", 0);
            pipWin.setAttribute("data-y", 0);

            isPipFull = false;

            document.getElementById("pip-full-btn").innerHTML = '<i class="ph-bold ph-corners-out text-lg"></i>';

            currentPipZoom = 1;
            updatePipZoom();

            document.getElementById("pip-scroll-area").scrollTop = 0;
        };

        window.closePip = () => {
            document.getElementById("pip-window").style.display = "none";
        };

        window.togglePipFull = () => {
            const pipWin = document.getElementById("pip-window");
            const btn = document.getElementById("pip-full-btn");

            if (isPipFull) {
                const isMobile = window.innerWidth <= 600;

                if (isMobile) {
                    pipWin.style.width = "92vw";
                    pipWin.style.height = "82svh";
                    pipWin.style.top = "9svh";
                    pipWin.style.left = "4vw";
                } else {
                    pipWin.style.width = "450px";
                    pipWin.style.height = "700px";
                    pipWin.style.top = "5vh";
                    pipWin.style.left = "calc(50vw + 220px)";
                }

                pipWin.style.borderRadius = "16px";
                btn.innerHTML = '<i class="ph-bold ph-corners-out text-lg"></i>';
            } else {
                pipWin.style.width = "100vw";
                pipWin.style.height = "100svh";
                pipWin.style.top = "0";
                pipWin.style.left = "0";
                pipWin.style.borderRadius = "0";
                btn.innerHTML = '<i class="ph-bold ph-corners-in text-lg"></i>';
            }

            pipWin.style.transform = "translate(0px, 0px)";
            pipWin.setAttribute("data-x", 0);
            pipWin.setAttribute("data-y", 0);

            isPipFull = !isPipFull;
        };

        window.adjustPipZoom = (val) => {
            currentPipZoom = Math.max(0.5, Math.min(3, currentPipZoom + val));
            updatePipZoom();
        };

        function updatePipZoom() {
            const content = document.getElementById("pip-content");

            content.style.transform = `scale(${currentPipZoom})`;
            content.style.width = currentPipZoom > 1 ? `${100 / currentPipZoom}%` : "100%";

            document.getElementById("pip-zoom-val").innerText = `${Math.round(currentPipZoom * 100)}%`;
        }

        if (window.interact) {
            interact("#pip-window").draggable({
                allowFrom: ".pip-header",
                listeners: {
                    move(e) {
                        if (isPipFull) return;

                        const target = e.target;

                        const x = (parseFloat(target.getAttribute("data-x")) || 0) + e.dx;
                        const y = (parseFloat(target.getAttribute("data-y")) || 0) + e.dy;

                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute("data-x", x);
                        target.setAttribute("data-y", y);
                    }
                }
            });
        }

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeDetailPanel();
                closePip();
            }
        });

        loadGithubFiles();
    </script>
</body>
</html>
